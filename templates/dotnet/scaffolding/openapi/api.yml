openapi: 3.0.3
info:
  title: OPDA API
  version: 1.0.0

servers:
  - url: https://opda-api.local
    description: OPDA API

x-amazon-apigateway-tags:
  - name: Health
    description: Service health operations

paths:
  /uprn/validate/{uprn}:
    get:
      tags:
        - UPRN
      summary: Validate a UPRN
      operationId: validateUprn
      parameters:
        - name: uprn
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UprnValidationResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
        - authorizer: []
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${service_invoke_arn}
        passthroughBehavior: when_no_match
        timeoutInMillis: 29000

  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - authorizer: []
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${service_invoke_arn}
        passthroughBehavior: when_no_match
        timeoutInMillis: 29000

components:
  schemas:
    UprnValidationResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
          example: true

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: healthy

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: string

  securitySchemes:
    authorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        authorizerUri: ${authorizer_invoke_arn}
        authorizerResultTtlInSeconds: 0
        type: request
        identitySource: method.request.header.Authorization

x-amazon-apigateway-gateway-responses:
  DEFAULT_4XX:
    responseTemplates:
      application/json: "{\"error\": \"Bad Request\", \"error_detail\": \"There is an issue with the request\"}"
  UNAUTHORIZED:
    responseTemplates:
      application/json: "{\"error\": \"Unauthorized\", \"error_detail\": \"You are not authorized to access this endpoint\"}"
  DEFAULT_5XX:
    responseTemplates:
      application/json: "{\"error\": \"Internal Server Error\", \"error_detail\": \"Something went wrong\"}"
  THROTTLED:
    responseTemplates:
      application/json: "{\"error\": \"No available request handler\", \"error_detail\": \"Request throttled. Please try again.\"}"
  INTEGRATION_TIMEOUT:
    responseTemplates:
      application/json: "{\"error\": \"No available request handler\", \"error_detail\": \"Service is initialising. Please try again in 30 seconds.\"}"
