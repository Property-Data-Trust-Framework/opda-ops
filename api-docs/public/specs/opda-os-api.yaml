openapi: 3.0.3
info:
  title: OPDA OS API
  version: 1.0.0

servers:
  - url: https://opda-api.local
    description: OPDA OS API

x-amazon-apigateway-tags:
  - name: Places
    description: Ordnance Survey Places API operations
  - name: Health
    description: Service health operations

paths:
  /v1/places/find:
    get:
      tags:
        - Places
      summary: Find places by query string
      operationId: findPlaces
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Free-text address or place name query
        - name: maxresults
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Maximum number of results to return
      responses:
        '200':
          description: Places search results (wrapped in a provenance envelope when signing is configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedPlacesResponse'
        '400':
          description: Bad request (e.g. missing query parameter)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      security:
        - authorizer: []
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${service_invoke_arn}
        passthroughBehavior: when_no_match
        timeoutInMillis: 29000

  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - authorizer: []
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${service_invoke_arn}
        passthroughBehavior: when_no_match
        timeoutInMillis: 29000

components:
  schemas:
    SignedPlacesResponse:
      type: object
      required: [data, provenance]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PlaceResult'
        provenance:
          $ref: '#/components/schemas/Provenance'

    Provenance:
      type: object
      required: [alg, kid, signature, signedAt, payloadHash]
      properties:
        alg:
          type: string
          example: RS256
        kid:
          type: string
        signature:
          type: string
          description: Base64url-encoded RS256 signature over the JCS-canonicalized data payload.
        signedAt:
          type: string
          format: date-time
        payloadHash:
          $ref: '#/components/schemas/PayloadHash'

    PayloadHash:
      type: object
      required: [alg, value]
      properties:
        alg:
          type: string
          example: SHA-256
        value:
          type: string
          description: Base64url-encoded SHA-256 hash of the JCS-canonicalized data payload.

    PlaceResult:
      type: object
      required: [uprn, address, udprn, xCoordinate, yCoordinate, localAuthority, propertyType]
      properties:
        uprn:
          type: string
          example: "200001858581"
        address:
          type: string
          example: "CAPEL ISAAC, BLUE ANCHOR ROAD, PENCLAWDD, SWANSEA, SA4 3JQ"
        udprn:
          type: string
          example: "21160648"
        xCoordinate:
          type: number
          example: 254994.04
        yCoordinate:
          type: number
          example: 195092.24
        localAuthority:
          type: string
          example: "CITY AND COUNTY OF SWANSEA"
        propertyType:
          type: string
          example: "Detached"

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: healthy

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: string

  securitySchemes:
    authorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        authorizerUri: ${authorizer_invoke_arn}
        authorizerResultTtlInSeconds: 0
        type: request
        identitySource: method.request.header.Authorization

x-amazon-apigateway-gateway-responses:
  DEFAULT_4XX:
    responseTemplates:
      application/json: "{\"error\": \"Bad Request\", \"error_detail\": \"There is an issue with the request\"}"
  UNAUTHORIZED:
    responseTemplates:
      application/json: "{\"error\": \"Unauthorized\", \"error_detail\": \"You are not authorized to access this endpoint\"}"
  DEFAULT_5XX:
    responseTemplates:
      application/json: "{\"error\": \"Internal Server Error\", \"error_detail\": \"Something went wrong\"}"
  THROTTLED:
    responseTemplates:
      application/json: "{\"error\": \"No available request handler\", \"error_detail\": \"Request throttled. Please try again.\"}"
  INTEGRATION_TIMEOUT:
    responseTemplates:
      application/json: "{\"error\": \"No available request handler\", \"error_detail\": \"Service is initialising. Please try again in 30 seconds.\"}"
